<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
/* General Styles */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
}

/* Start Screen Overlay */
#start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  flex-direction: column;
}

#start-btn {
  padding: 20px 50px;
  font-size: 28px;
  background: linear-gradient(45deg, #ff6b6b, #ff8e53);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
  transition: transform 0.3s;
}

#start-btn:hover {
  transform: scale(1.1);
}

/* Slides */
.slide {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  position: absolute;
  width: 100%;
}

.active {
  display: flex;
}

/* Cake */
.cake {
  position: relative;
  margin-top: 30px;
  width: 200px;
  height: 180px;
  background: linear-gradient(180deg, #f8bbd0 0%, #f48fb1 100%);
  border-radius: 15px 15px 5px 5px;
  display: flex;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.cake::before {
  content: '🎂';
  font-size: 40px;
  position: absolute;
  top: -30px;
}

.cake::after {
  content: '';
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 35px;
  background: #ec407a;
  border-radius: 0 0 15px 15px;
}

.candle {
  width: 18px;
  height: 70px;
  background: linear-gradient(to right, #ffffff, #e0e0e0);
  position: absolute;
  top: -35px;
  border-radius: 3px;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}

.flame {
  width: 22px;
  height: 32px;
  background: radial-gradient(ellipse at bottom, #fff700 0%, #ff8c00 50%, transparent 70%);
  border-radius: 50% 50% 20% 20%;
  position: absolute;
  top: -32px;
  left: -2px;
  animation: flicker 0.15s infinite alternate;
  filter: blur(1px);
}

@keyframes flicker {
  from { transform: scaleY(1) scaleX(1); opacity: 1; }
  to { transform: scaleY(1.3) scaleX(0.8); opacity: 0.8; }
}

/* Celebration */
.confetti {
  position: absolute;
  width: 12px;
  height: 12px;
  top: -20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
  }
}

/* Photo */
.photo {
  width: 240px;
  height: 240px;
  object-fit: cover;
  border-radius: 50%;
  border: 6px solid white;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* Text */
h1 {
  font-size: 42px;
  margin: 0 0 20px 0;
  text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
}

h2 {
  font-size: 24px;
  margin: 0 20px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
}

.instructions {
  background: rgba(255,255,255,0.2);
  padding: 12px 25px;
  border-radius: 25px;
  margin-top: 25px;
  font-size: 18px;
}

.tap-hint {
  animation: tapPulse 1.5s infinite;
}

@keyframes tapPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Responsive */
@media (max-width: 600px) {
  h1 { font-size: 32px; }
  h2 { font-size: 20px; }
  .photo { width: 200px; height: 200px; }
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <button id="start-btn">🎉 Click to Celebrate! 🎉</button>
  <p style="margin-top:15px; opacity: 0.8;">👆 Tap anywhere to blow the candle!</p>
</div>

<!-- Background Music -->
<!-- REPLACE THE SRC BELOW WITH YOUR OWN SONG LINK IF NEEDED -->
<audio id="music">
  <source src="https://actions.google.com/sounds/v1/celebrations/cheering_and_celebration.ogg" type="audio/ogg">
</audio>

<!-- Slide 1: Blow Candle -->
<div class="slide active" id="slide1" onclick="blowCandle()">
  <h1>Make a Wish! 🎂</h1>
  <p class="instructions tap-hint">👆 Tap anywhere to blow the candle!</p>
  <div class="cake" onclick="blowCandle()">
    <div class="candle" onclick="blowCandle()">
      <div class="flame" id="flame" onclick="blowCandle()"></div>
    </div>
  </div>
</div>

<!-- Slide 2: Happy Birthday -->
<div class="slide" id="slide2">
  <h1>🎉 Happy Birthday!!! 🎉</h1>
</div>

<!-- Slide 3: Photo & Message -->
<div class="slide" id="slide3">
  <!-- REPLACE THE SRC BELOW WITH YOUR PHOTO URL -->
  <img src="https://via.placeholder.com/240" class="photo" alt="Birthday Person">
  <!-- CHANGE YOUR MESSAGE BELOW -->
  <h2>May Your Life Be Filled With Love, Joy & Success! 💖</h2>
</div>

<script>
let isBlown = false;

document.getElementById('start-btn').addEventListener('click', () => {
  const music = document.getElementById("music");
  music.volume = 0.4;
  music.play().catch(e => console.log("Audio play failed: ", e));
  document.getElementById('start-screen').style.display = 'none';
});

function blowCandle() {
  if (isBlown) return;
  isBlown = true;
  
  const flame = document.getElementById("flame");
  flame.style.display = "none";
  
  setTimeout(() => {
    nextSlide("slide1", "slide2");
    startConfetti();
    
    setTimeout(() => {
      nextSlide("slide2", "slide3");
      
      setTimeout(() => {
        document.getElementById("music").pause();
        document.getElementById("music").currentTime = 0;
      }, 3000);
      
    }, 4000);
  }, 800);
}

function nextSlide(currentId, nextId) {
  document.getElementById(currentId).classList.remove("active");
  document.getElementById(nextId).classList.add("active");
}

function startConfetti() {
  for (let i = 0; i < 100; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.backgroundColor = "hsl(" + Math.random() * 360 + ", 100%, 50%)";
    confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(confetti);
  }
}
</script>

</body>
</html>
